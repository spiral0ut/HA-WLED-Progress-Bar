name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Python tests ─────────────────────────────────────────────────────────────
  python-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio voluptuous aiohttp

      - name: Run unit tests
        run: pytest tests/test_led_helpers.py -v --tb=short

  # ── Ruff lint / format check ──────────────────────────────────────────────────
  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check custom_components/ tests/

      - name: Lint
        run: ruff check custom_components/ tests/

  # ── Node.js syntax check for Lovelace card ───────────────────────────────────
  js-syntax:
    name: JS syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check Lovelace card
        # `node --check` parses the file without executing it.
        # This catches syntax errors without requiring a build toolchain.
        run: |
          node --check custom_components/wled_progress_bar/www/wled-progress-bar-card.js
          echo "JS syntax OK"

  # ── HACS validation ──────────────────────────────────────────────────────────
  hacs-validate:
    name: HACS action validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands
